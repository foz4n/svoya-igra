<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Своя игра</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-bar">
    <button id="fullscreen-btn">Fullscreen</button>

    <div>
        <button id="reset-btn">Сбросить игру</button>
        <button id="finish-btn">Завершить игру</button>
    </div>
</div>

<main>
    <div id="game-layout">
        <div id="categories-column"></div>
        <div id="questions-grid"></div>
    </div>
</main>

<div id="scoreboard">
    <div id="score-1">Команда 1: 0</div>
    <div id="score-2">Команда 2: 0</div>
</div>

<div id="question-modal">
    <div class="modal-window">

        <div id="question-title"></div>

        <div id="answers-container"></div>

        <div id="score-panel">

            <div>
                Команда 1
                <button onclick="addScore(1, true)">+</button>
                <button onclick="addScore(1, false)">-</button>
            </div>

            <div>
                Команда 2
                <button onclick="addScore(2, true)">+</button>
                <button onclick="addScore(2, false)">-</button>
            </div>

        </div>

<div class="action-buttons">
    <button id="close-question-btn">Закрыть</button>
</div>

    </div>
</div>

<div id="winner-screen">

    <div>

        <div id="winner-results"></div>

        <div style="margin-top:20px;">
            <button id="close-winner-btn">
                Закрыть
            </button>
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
